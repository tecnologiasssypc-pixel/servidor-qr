<!DOCTYPE html>
<html lang="es">
<head>
<meta charset="UTF-8">
<title>SSPC - Carga de Imagen</title>
<meta name="viewport" content="width=device-width, initial-scale=1.0">

<link href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.8/dist/css/bootstrap.min.css" rel="stylesheet">

<style>
body { background:#f5f5f5; font-family:sans-serif; }
.card { border-radius:12px; box-shadow:0 4px 15px rgba(0,0,0,0.1); }
</style>
</head>

<body>

<div class="container mt-5">
  <div class="card p-4 mx-auto" style="max-width:400px;">

    <h5 class="text-center mb-3">Subir Imagen</h5>

    <form id="formulario">
      <input type="text" name="identificador" class="form-control mb-2" placeholder="Identificador" required>

      <input type="file" name="imagen" class="form-control mb-3" accept="image/*" required onchange="previewImage(event)">

      <button class="btn btn-dark w-100">Subir</button>
    </form>

    <!-- Preview -->
    <div class="text-center mt-3">
      <img id="preview" class="img-fluid d-none">
    </div>

    <!-- Loader -->
    <div id="loader" class="text-center mt-3 d-none">
      <div class="spinner-border"></div>
      <p>Procesando...</p>
    </div>

    <!-- Resultado -->
    <div id="resultado" class="text-center mt-3"></div>

  </div>
</div>

<script>
function previewImage(event) {
  const reader = new FileReader();

  reader.onload = function () {
    const img = document.getElementById("preview");
    img.src = reader.result;
    img.classList.remove("d-none");
  }

  reader.readAsDataURL(event.target.files[0]);
}

document.getElementById("formulario").addEventListener("submit", async function(e) {
  e.preventDefault();

  const loader = document.getElementById("loader");
  const resultado = document.getElementById("resultado");

  loader.classList.remove("d-none");
  resultado.innerHTML = "";

  const formData = new FormData(this);

  try {
    const res = await fetch("/subir", {
      method: "POST",
      body: formData
    });

    if (!res.ok) {
      const errorText = await res.text();
      throw new Error(errorText);
    }

    const data = await res.json();

    resultado.innerHTML = `
  <div class="fade-in">
    <p class="text-success">Imagen subida correctamente</p>
    <img src="${data.qr}" alt="QR" style="max-width:200px;">
    <p class="mt-2 small">Escanea el QR</p>
  </div>
`;

    this.reset();
    document.getElementById("preview").classList.add("d-none");

  } catch (err) {
    resultado.innerHTML = `<p class="text-danger">${err.message}</p>`;
  }

  loader.classList.add("d-none");
});
</script>

</body>
</html>
